name: Deploy API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_KEY }}
          envs: GITHUB_TOKEN
          script_stop: true
          script: |
            set -euo pipefail
            export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/snap/bin"
            DEPLOY_DIR="/root/bkbaji-server"
            DOMAIN="bkbajiapi.xyz"
            REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

            prepare_apt() {
              local mirrors="/etc/apt/sources.list.d/ubuntu-mirrors.list"
              if [ -f "$mirrors" ]; then
                sudo awk 'NF && !seen[$0]++' "$mirrors" | sudo tee "${mirrors}.dedup" >/dev/null
                sudo mv "${mirrors}.dedup" "$mirrors"
              fi
              if sudo apt-get update -qq; then
                return 0
              fi
              echo "WARN: apt-get update failed; removing duplicate mirror list"
              sudo rm -f "$mirrors"
              sudo apt-get update -qq || echo "WARN: apt-get update still failed"
              return 0
            }

            if ! command -v git >/dev/null 2>&1; then
              echo "ERROR: git is not installed on the host."
              exit 1
            fi

            if [ ! -d "${DEPLOY_DIR}/.git" ]; then
              echo "Cloning repository into ${DEPLOY_DIR}..."
              rm -rf "${DEPLOY_DIR}"
              git clone --branch main "${REPO_URL}" "${DEPLOY_DIR}"
            fi

            cd "${DEPLOY_DIR}"
            git remote set-url origin "${REPO_URL}"
            git fetch origin main
            git reset --hard origin/main

            if [ ! -f .env ]; then
              echo "ERROR: ${DEPLOY_DIR}/.env is missing. Copy .env.example and fill secrets on the server."
              exit 1
            fi

            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker not found — installing..."
              prepare_apt
              curl -fsSL https://get.docker.com | sh
              export PATH="/usr/local/bin:/usr/bin:/bin:${PATH}"
            fi

            if ! command -v nginx >/dev/null 2>&1; then
              echo "Nginx not found — installing..."
              prepare_apt
              sudo apt-get install -y -qq nginx certbot python3-certbot-nginx
            fi

            if [ -f "deploy/nginx/${DOMAIN}.conf" ]; then
              sudo cp "deploy/nginx/${DOMAIN}.conf" "/etc/nginx/sites-available/${DOMAIN}"
              sudo ln -sf "/etc/nginx/sites-available/${DOMAIN}" "/etc/nginx/sites-enabled/${DOMAIN}"
              sudo rm -f /etc/nginx/sites-enabled/default
            fi

            free_app_port() {
              echo "Stopping existing compose stack..."
              docker compose down --remove-orphans 2>/dev/null || true

              local cid
              for cid in $(docker ps -q --filter "publish=5000" 2>/dev/null); do
                echo "Stopping container ${cid} (port 5000)..."
                docker stop "${cid}" || true
              done

              if command -v fuser >/dev/null 2>&1; then
                if fuser 5000/tcp >/dev/null 2>&1; then
                  echo "Freeing port 5000..."
                  sudo fuser -k 5000/tcp 2>/dev/null || true
                fi
              fi
            }

            free_app_port
            docker compose up -d --build

            sudo nginx -t
            sudo systemctl reload nginx

            if [ ! -d "/etc/letsencrypt/live/${DOMAIN}" ]; then
              echo "Requesting TLS certificate for ${DOMAIN}..."
              sudo certbot --nginx -d "${DOMAIN}" --non-interactive --agree-tos \
                --register-unsafely-without-email || echo "WARN: certbot failed — point DNS A record to this host first"
            else
              sudo certbot renew --quiet || true
            fi

            sudo nginx -t
            sudo systemctl reload nginx

            echo "Deployed https://${DOMAIN}"
